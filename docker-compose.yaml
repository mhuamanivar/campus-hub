version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: campushub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campushub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campushub_secret}
      POSTGRES_DB: ${POSTGRES_DB:-campushub}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campushub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: